runtime: python

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - clickupApiKey
      - clickupTeamId
    properties:
      clickupApiKey:
        type: string
        description: Your ClickUp API key.
      clickupTeamId:
        type: string
        description: Your ClickUp Team ID.
  commandFunction: |-
    def command(config):
        env = {
            "CLICKUP_API_KEY": config["clickupApiKey"],
            "CLICKUP_TEAM_ID": config["clickupTeamId"],
        }
        return {
            "command": "uv",
            "args": [
                "run",
                "python",
                "-m",
                "smithery.cli.start"
            ],
            "env": env,
        }
    command

env:
  CLICKUP_API_KEY: ${CLICKUP_API_KEY}
  CLICKUP_TEAM_ID: ${CLICKUP_TEAM_ID}
