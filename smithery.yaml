runtime: typescript

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - clickupApiKey
      - clickupTeamId
    properties:
      clickupApiKey:
        type: string
        description: Your ClickUp API key.
      clickupTeamId:
        type: string
        description: Your ClickUp Team ID.
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['build/index.js'],
      env: {
        CLICKUP_API_KEY: config.clickupApiKey,
        CLICKUP_TEAM_ID: config.clickupTeamId
      }
    })

env:
  - CLICKUP_API_KEY
  - CLICKUP_TEAM_ID
  
buildCommand: npm run build
